# AppProfile — Collabora Online (WOPI document editor)
#
# Source chart: oci://registry.opencode.de/bmi/opendesk/components/supplier/collabora/charts-mirror
#   collabora-online v1.1.45
# Value paths verified against: opendesk/helmfile/apps/collabora/values.yaml.gotmpl
# Chart versions from: opendesk/helmfile/environments/default/charts.yaml.gotmpl
#
# Secret inventory:
#   App-internal (1):
#     collabora.password  → admin panel password (not exposed to end users)
#
# Design notes:
#   Collabora is a WOPI document-editing server. End users never interact with it
#   directly — they access it through the Nextcloud kernel service via the WOPI
#   protocol. The Nextcloud integration is a kernel-tier concern (the Nextcloud
#   OCS API Job provisions the Collabora URL during Inc 7 storage reconciler).
#
#   As a result Collabora has NO kernel requirements (no OIDC client, no DB, no S3) —
#   all of those are owned by Nextcloud. Only the admin password is an app-internal
#   secret generated by the orchestrator.
#
#   The chart does not support existingSecret → Pattern B (Tofu Controller).
apiVersion: gentianos.io/v1alpha1
kind: AppProfile
metadata:
  name: collabora
spec:
  displayName: "Collabora Online"
  description: "WOPI-compatible browser-based office suite for collaborative document editing."

  # No kernelRequirements — Collabora is accessed via WOPI from the Nextcloud kernel
  # service. OIDC, database, and S3 are handled entirely by Nextcloud.

  provides:
    - name: office-editor
      protocol: wopi

  chart:
    repository: "oci://registry.opencode.de/bmi/opendesk/components/supplier/collabora/charts-mirror"
    name: collabora-online
    version: "1.1.45"

  # No valueMapping — no kernel-provided credentials to inject.

  appSecrets:
    # Admin panel password — used only for internal admin API calls, not end-user login.
    - name: admin_password
      valuePath: "collabora.password"

  # Pattern B — collabora-online chart injects the admin password as a direct Helm value.
  deploymentMethod: tofu-controller
